"2.2":{name:"Variables Separables",sec:"2.2",color:"#E8440A",
identify:["¿Se puede escribir como $\\dfrac{dy}{dx} = g(x)\\cdot h(y)$?","Es decir: un factor solo con $x$ y otro solo con $y$","Ejemplo: $\\dfrac{dy}{dx} = x^2 \\cdot y$ → $g(x)=x^2,\\; h(y)=y$ ✓"],
steps:[{t:"Separar variables",x:"\\frac{dy}{h(y)} = g(x)\\,dx",d:"Pasa todo lo de $y$ con $dy$ y todo lo de $x$ con $dx$"},{t:"Integrar ambos lados",x:"\\int \\frac{dy}{h(y)} = \\int g(x)\\,dx",d:"Cada lado se integra respecto a su variable"},{t:"Resolver + constante",x:"H(y) = G(x) + C",d:"Solo UNA constante $C$. Despeja $y$ si puedes."}],

"2.3":{name:"Coeficientes Homogéneos",sec:"2.3",color:"#9333ea",
identifyDetailed:{intro:"Verifica que $M$ y $N$ son homogéneas del MISMO grado con la «prueba del $\\lambda$»:",

tricks:["Truco: suma exponentes de $x$ e $y$ en cada término. Si todos dan lo mismo, es homogénea.","En $x^2 - 3y^2$: $2+0=2$, $0+2=2$ ✓.  En $2xy$: $1+1=2$ ✓","$e^{y/x}$, $\\sin(y/x)$, $\\ln(x/y)$ SÍ pueden ser homogéneas grado 0."]},
steps:[{t:"Verificar homogeneidad",x:"M(\\lambda x,\\lambda y) = \\lambda^n M \\;\\;\\text{y}\\;\\; N(\\lambda x,\\lambda y) = \\lambda^n N",d:"Mismo grado $n$"},{t:"Sustituir y = vx",x:"y = vx,\\; dy = v\\,dx + x\\,dv",d:"Si $M$ es más simple, usa $x = uy$"},{t:"Reemplazar en la EDO",x:"M(x,vx)\\,dx + N(x,vx)(v\\,dx + x\\,dv) = 0",d:""},{t:"Factorizar xⁿ y simplificar",x:null,d:"Saca $x^n$, divide. Queda SEPARABLE en $v$ y $x$."},{t:"Separar e integrar",x:"\\frac{h(v)}{\\ldots}\\,dv = \\frac{dx}{x}",d:""},{t:"Regresar a y",x:"v = y/x",d:"Sustituye de vuelta"}],
ex:{p:"(x^2 - 3y^2)dx + 2xy\\,dy = 0",s:"y=vx \\;\\Rightarrow\\; x^2[(1-v^2)dx + 2vx\\,dv]=0",a:"y = \\pm\\sqrt{x^2(1+Cx)}"},
tip:"Prueba del $\\lambda$: sustituye, expande, factoriza $\\lambda^n$. Mismo $n$ = homogénea."},

"2.4":{name:"Casi Homogéneas",sec:"2.4",color:"#0A7B5A",
identify:["Forma: $\\dfrac{dy}{dx} = F\\!\\left(\\dfrac{Ax + By + C}{ax + by + c}\\right)$","Los coeficientes son rectas. Hay DOS casos según si son paralelas o no.","Caso 1: $\\frac{A}{B} \\neq \\frac{a}{b}$ → rectas NO paralelas → se cortan en $(h,k)$","Caso 2: $\\frac{A}{B} = \\frac{a}{b}$ → rectas paralelas"],
steps:[{t:"Determinar el caso",x:"\\frac{A}{B} \\stackrel{?}{=} \\frac{a}{b}",d:"Si son distintos → Caso 1 (no paralelas)\nSi son iguales → Caso 2 (paralelas)"},{t:"Caso 1: encontrar (h,k)",x:"\\begin{cases} Ah + Bk + C = 0 \\\\ ah + bk + c = 0 \\end{cases}",d:"Resuelve el sistema para encontrar el punto de intersección"},{t:"Caso 1: sustituir",x:"x = x' + h,\\; y = y' + k \\;\\Rightarrow\\; dx = dx',\\; dy = dy'",d:"Esto elimina las constantes $C$ y $c$. Queda HOMOGÉNEA."},{t:"Caso 2: sustituir",x:"z = Ax + By \\;\\Rightarrow\\; dz = A\\,dx + B\\,dy",d:"Esto la convierte en SEPARABLE."},{t:"Resolver y regresar",x:null,d:"Resuelve la homogénea o separable resultante.\nAl final sustituye de vuelta a las variables originales."}],
ex:{p:"\\frac{dy}{dx} = \\frac{2x+3y+1}{3x-2y-5}",s:"\\frac{A}{B}=\\frac{2}{3} \\neq \\frac{3}{-2} \\;\\Rightarrow\\; \\text{Caso 1: }(h,k)=(1,-1)",a:"\\ln|(y+1)^2+(x-1)^2| - 3\\arctan\\!\\left(\\frac{y+1}{x-1}\\right) = C"},
tip:"Si los coeficientes son rectas, es «casi homogénea». Determina si son paralelas o no."},

"2.5":{name:"Ecuación Exacta",sec:"2.5",color:"#142850",
identify:["Forma: $M(x,y)\\,dx + N(x,y)\\,dy = 0$","Calcula $\\dfrac{\\partial M}{\\partial y}$ y $\\dfrac{\\partial N}{\\partial x}$","Si $\\dfrac{\\partial M}{\\partial y} = \\dfrac{\\partial N}{\\partial x}$ → ¡Es EXACTA!","Ejemplo: $(2x-5y)dx + (3y^2-5x)dy = 0$ → ambas dan $-5$ ✓"],

"2.6":{name:"Factor Integrante",sec:"2.6",color:"#d97706",

steps:[{t:"Confirmar NO exacta",x:"\\frac{\\partial M}{\\partial y} \\neq \\frac{\\partial N}{\\partial x}",d:""},{t:"§2.6.1 — Caso f(x)",x:"\\frac{\\frac{\\partial M}{\\partial y} - \\frac{\\partial N}{\\partial x}}{N} = f(x) \\;\\Rightarrow\\; \\mu = e^{\\int f(x)\\,dx}",d:"Si el cociente solo depende de $x$"},{t:"§2.6.2 — Caso g(y)",x:"\\frac{\\frac{\\partial M}{\\partial y} - \\frac{\\partial N}{\\partial x}}{M} = -g(y) \\;\\Rightarrow\\; \\mu = e^{\\int g(y)\\,dy}",d:"Si el cociente solo depende de $y$"},{t:"§2.6.3 — Homogéneos",x:"\\mu = \\frac{1}{Mx + Ny} \\quad (Mx+Ny \\neq 0)",d:"Cuando $M$ y $N$ son homogéneas del mismo grado"},{t:"§2.6.4 — yf(xy)dx + xg(xy)dy",x:"\\mu = \\frac{1}{Mx - Ny} \\quad (f \\neq g)",d:""},{t:"Multiplicar y resolver",x:"\\mu M\\,dx + \\mu N\\,dy = 0",d:"Ahora es exacta → método de §2.5"}],
